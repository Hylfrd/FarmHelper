name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-test:
    name: Linux / test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true
          cache-disabled: true
          add-job-summary: never
          add-job-summary-as-pr-comment: never
          dependency-graph: disabled
          build-scan-publish: false

      - name: Allow Gradle wrapper execution
        run: chmod u+x -- ./gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace

  linux-build:
    name: Linux / build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true
          cache-disabled: true
          add-job-summary: never
          add-job-summary-as-pr-comment: never
          dependency-graph: disabled
          build-scan-publish: false

      - name: Allow Gradle wrapper execution
        run: chmod u+x -- ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JARs
        if: success() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: farmhelper-linux-jars
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 7

  windows-test:
    name: Windows / test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true
          cache-disabled: true
          add-job-summary: never
          add-job-summary-as-pr-comment: never
          dependency-graph: disabled
          build-scan-publish: false

      - name: Run tests
        run: .\gradlew.bat test --no-daemon --stacktrace

  windows-build:
    name: Windows / build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true
          cache-disabled: true
          add-job-summary: never
          add-job-summary-as-pr-comment: never
          dependency-graph: disabled
          build-scan-publish: false

      - name: Build
        run: .\gradlew.bat build --no-daemon --stacktrace

      - name: Upload JARs
        if: success() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: farmhelper-windows-jars
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 7
